<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/css.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduNode: A centralized digital hub designed to organize, track, and manage your university courses through a clean, responsive web interface">
    <title>EduNode | Add Course</title>
</head>
<body>
    <header>
        <div class="name">
            <p>Edu<span>Node</span></p>
        </div>
        <nav>
            <ul id="nav">
                <li><a href="index.html" title="Home" >Home</a></li>
                <li><a href="courses.html" title="Courses">Courses</a></li>
                <li><a href="addcourse.html" title="Add Course"  class="active">Add Courses</a></li>
                <li><a href="contact.html" title="Contact Us">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Edu<span>Node</span></h1>
            <p class="hi">Smart Way to Manage Your Courses.</p>
            <h2>Add Course</h2>
            <p>Keep growing! Add a new course to your journey and track your progress toward mastering new skill</p>
        </section>
        <section class="adds">
            <form action="#">
                <div class="form">
                    <label for="name" class="namelable">Course Name</label>
                    <input type="text" id="name" placeholder="Course Name" required>
                </div>
                <div class="form">
                    <label for="ins" class="namelable">Instructor</label>
                    <input type="text" id="ins" placeholder="Instructor" required>
                </div>
                <div class="form">
                    <label class="namelable">Credit Hours</label>
                    <div class="radios">
                        <input type="radio" id="hour2" name="hour">
                        <label for="hour2" class="lhour">2 Hours</label>
                        <input type="radio" id="hour3" name="hour">
                        <label for="hour3" class="lhour"  >3 Hours</label>
                    </div>
                </div>
                <div class="form">
                    <label for="note" class="namelable">Notes</label>
                    <textarea placeholder="Notes" id="note" required></textarea>
                </div>
                <div class="save">
                    <label for="save"></label>
                    <input type="submit" value="Send" name="save">
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Basmalah Hatem. All Rights Reserved.</p>
    </footer>
</body>
</html>
